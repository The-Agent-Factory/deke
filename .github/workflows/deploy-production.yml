name: Deploy → Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual production deploy"
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel an in-flight production deploy

jobs:
  deploy:
    name: Deploy to Railway Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dekesharon.com

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to production
        run: railway up --service deke-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}

      - name: Health check production
        run: |
          echo "Waiting for production to be healthy..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dekesharon.com/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "Production health check failed after 5 minutes"
          exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production deploy failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Production deployment failed on commit ${context.sha}.\n\nSee the [failed run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nImmediate action may be required.`,
              labels: ['production', 'incident']
            });
