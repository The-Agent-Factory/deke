name: Health Monitor

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check-production:
    name: Check Production
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://dekesharon.com/api/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Production health: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "UNHEALTHY"
            exit 1
          fi

      - name: Open incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Check if an open incident issue already exists to avoid spam
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'incident,production',
              state: 'open'
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Production down — ${new Date().toISOString()}`,
                body: `Health monitor detected that **https://dekesharon.com** is returning a non-200 status.\n\n- Check Railway dashboard\n- Check database connection\n- Check deployment logs\n\nThis issue will be closed automatically once the site recovers.`,
                labels: ['incident', 'production']
              });
            }

  check-staging:
    name: Check Staging
    runs-on: ubuntu-latest
    continue-on-error: true  # Staging failures are non-critical
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://deke-staging.up.railway.app/api/health || echo "000")
          echo "Staging health: HTTP $STATUS"
