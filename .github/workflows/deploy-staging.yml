name: Deploy → Staging

on:
  push:
    branches: [staging]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to staging
        id: deploy
        run: |
          railway up --service deke-staging --detach
          echo "url=https://deke-staging.up.railway.app" >> $GITHUB_OUTPUT
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

      - name: Wait for deployment to be healthy
        run: |
          echo "Waiting for staging to become healthy..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://deke-staging.up.railway.app/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "Staging did not become healthy within 3 minutes"
          exit 1

      - name: Comment deployment URL on commit
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const { context } = require('@actions/github');
            const status = '${{ job.status }}' === 'success'
              ? '✅ Staging deployed'
              : '❌ Staging deployment failed';
            const url = 'https://deke-staging.up.railway.app';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status}\n\n🔗 **Staging URL:** ${url}\n\n*Review this with Deke before merging to production.*`
            });
